[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = ""
healthcheckPath = "/health.php"  # ← CON .php (crítico)
healthcheckTimeout = 30          # ← Reducido: 30s es suficiente
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envs]
PORT = "8000"
PUBLIC_DIR = "public"
APP_ENV = "production"