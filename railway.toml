[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# El healthcheck ahora usa el nativo de Docker + endpoint /health
startCommand = ""  # ← Dejar vacío, el ENTRYPOINT lo maneja
healthcheckPath = "/health.php"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variables por defecto (Railway las sobrescribe en producción)
[deploy.envs]
PORT = "8000"
PUBLIC_DIR = "public"
APP_ENV = "production"